<!DOCTYPE html>
<html>
    <head><title>University portal</title></head>
    <body>
        <h3 style="text-align: center; color:rgb(99, 165, 167)">University Admission Appication Portal</h3>
        <fieldset>
            <legend>Personal Information</legend>
            <form>
                <label for="name">Full Name:</label>
                <input type="text" id="name" name="name" placeholder="Enter Full name.."><br>
                <label for="DOB">Date od birth:</label>
                <input type="date" id="DOB" name="DOB" ><br><br>
                <label for="gender">Gender:</label>
               <input type="radio" id="male" name="gender" value="Male">
        <label for="male">Male</label>
        <input type="radio" id="Female" name="gender" value="Female">
        <label for="Female">Female</label>
        <input type="radio" id="Other" name="gender" value="other">
        <label for="other">Other</label><br><br>
        <label for="nationality">Nationality:</label>
        <select id="nationality" name="nationality">
            <option value="Eroupe">Eroupe</option>
            <option value="China">China</option>
            <option value="Indonesia">Indonesia</option>
            <option value="Pakistan">Pakistan</option>
            <option value="Japan">Japan</option>
            <option value="India">India</option>
        </select><br><br>
        <label for="Idproof">ID Proof:</label>
        <input type="text" id="Idproof" name="Idproof" title="Aadhar/PAN/Passport Number"><br>
        <label for="blood">Blood Group:</label>
        <datalist id="blood">
            <option value="O+"></option>
            <option value="O-"></option>
            <option value="A+"></option>
            <option value="B+"></option>
        </datalist>
        <br><br>
        <label for="category">Category</label>
        <section id="category" name="category">
            <option value="General">General</option>
            <option value="OBC">OBC</option>
            <option value="SC">SC</option>
            <option value="ST">ST</option>
        </section><br><br>
            </form>
        </fieldset>
    </body>
</html>
