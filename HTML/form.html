<!DOCTYPE html>
<html>
    <head>
        <title>HTML Forms</title>
    </head>
    <body>
        <div>
            <form autocomplete="off">
                <label for="name">Name: </label>
                <input id="name" type="text" name="name" placeholder="Enter your name"><br><br>
                <label for="mail">Email: </label>
                <input id="mail" type="mail" name="mail" placeholder="Enter Your MailID"><br><br>
                <label for="password">Password: </label>
    <input type="password" id="password" name="password" placeholder="Enter your password" required><br><br>
    <label for="birthday">DOB: </label>
    <input type="date" id="birthday" name="birthday" placeholder="Enter your birthday" required><br><br>
    <label for="age" >Age:</label><br>
    <input type="number" min="18" max="60" oninput="if(this.value > 60) this.value=60" required><br>
    <div style="display: flex; gap: 5px;">
    <fieldset style="width: fit-content;padding:5px;" >

        

        <legend>Gender:</legend>
        <input type="radio" id="male" name="gender" value="male">
        <label  for="male">Male</label>
        <input type="radio" id="female" name="gender" value="female">
        <label for="female">Female</label>
                <input type="radio" id="other" name="gender" value="other">
        <label for="other">Other</label>
    </fieldset>
    <fieldset style="width: fit-content;padding:5px;">
        <legend>Hobbies:</legend>
        <input type="checkbox" id="reading" name="hobby" value="reading">
        <label for="reading">Reading</label><br>
        <input type="checkbox" id="music" name="hobby" value="music">
        <label for="music">Music</label><br>
        <input type="checkbox" id="drawing" name="hobby" value="drawing">
        <label for="drawing">Drawing</label><br>
        <input type="checkbox" id="sport" name="hobby" value="sport">
        <label for="sport">Sports</label><br>
        <input type="checkbox" id="travel" name="hobby" value="travel">
        <label for="travel">Travel</label><br>
    </fieldset>

    </div>
    <br>
    <label for="state">State:</label>
<select id="state" name="state">

<optgroup label="Group1">
    <option value="TamilNadu">TamilNadu</option>
<option value="Maharashtra">Maharashtra</option>
<option value="Rajasthan">Rajasthan</option>
</optgroup>
<optgroup label="group2">
<option value="Kerala">Kerala</option>
<option value="Goa">Goa</option>
</optgroup>

</select>
<br><br>
<label for="Message">Message:</label><br>
<textarea id="Message" name="Message" row="5" col="50" placeholder="Enter your message here...">
</textarea>
<br><br>
    <label for="file">Upload Resume: </label>
    <input type="file"  id="file" name="file" accept=".jpeg,.png"  >
    <br><br>


    <label for="skill">skill</label>
    <ul>
        <li>C - <input type="range" id="skill" min="0" max="10" value="5"> 10</li>
        <li>Java - <input type="range" id="skill" min="0" max="10" value="5"> 10</li>
    </ul>
        <div style="display: flex; gap: 5px;">
        <input type="submit" value="Submit">
    <input type="Reset" value="Reset">
    </div>
    
            </form>
           

</form><br>
        </div>
    </body>
</html>
